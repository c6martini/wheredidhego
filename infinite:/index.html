<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NBA Infinite — Where Did He Go?</title>
<meta name="description" content="Endless NBA college trivia. Guess which college NBA players attended."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F9F8F5; --surface: #FFFFFF; --border: #E5E2D9; --border-focus: #1A1916;
    --text-primary: #1A1916; --text-secondary: #6B6860; --text-tertiary: #A8A59E;
    --accent: #1A1916;
    --green: #2D6A4F; --green-bg: #EAF4EE; --green-border: #2D6A4F;
    --red: #A32D2D; --red-bg: #FCEBEB; --red-border: #A32D2D;
    --blue: #185FA5; --blue-bg: #E6F1FB; --blue-border: #185FA5;
    --yellow: #7A5C00; --yellow-bg: #FFF8E1; --yellow-border: #C9A227;
    --purple: #5B3FA6; --purple-bg: #F0EBFF; --purple-border: #5B3FA6;
  }
  html { scroll-behavior: smooth; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text-primary); min-height:100vh; display:flex; flex-direction:column; align-items:center; }

  /* HEADER */
  header { width:100%; max-width:600px; padding:32px 24px 0; display:flex; flex-direction:column; align-items:center; }
  .header-top { width:100%; display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .logo { font-family:'DM Serif Display',serif; font-size:30px; letter-spacing:-0.5px; color:var(--text-primary); text-decoration:none; }
  .logo span { font-style:italic; }
  .icon-btn { width:36px; height:36px; border:1px solid var(--border); border-radius:8px; background:var(--surface); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; transition:background .15s; color:var(--text-secondary); }
  .icon-btn:hover { background:var(--border); }
  .tagline { font-size:12px; color:var(--text-tertiary); letter-spacing:.8px; text-transform:uppercase; align-self:flex-start; }
  .divider { width:100%; height:1px; background:var(--border); margin:20px 0 0; }

  /* MAIN */
  main { width:100%; max-width:600px; padding:24px 24px 60px; display:flex; flex-direction:column; align-items:center; gap:20px; }

  /* PLAYER CARD */
  .player-card { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:20px 24px; display:flex; align-items:center; gap:20px; animation:fadeUp .4s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .player-photo { width:84px; height:84px; border-radius:50%; background:var(--bg); border:1px solid var(--border); overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:34px; }
  .player-photo img { width:100%; height:100%; object-fit:cover; }
  .player-info h2 { font-family:'DM Serif Display',serif; font-size:24px; line-height:1.2; letter-spacing:-.3px; }
  .player-info .meta { font-size:13px; color:var(--text-secondary); margin-top:5px; display:flex; align-items:center; gap:6px; }
  .meta-dot { width:3px; height:3px; border-radius:50%; background:var(--text-tertiary); display:inline-block; }

  /* QUESTION */
  .question-label { font-size:15px; color:var(--text-secondary); text-align:center; line-height:1.6; animation:fadeUp .4s .1s ease both; }
  .question-label strong { color:var(--text-primary); font-weight:500; }

  /* GUESS SLOTS */
  .guesses-container { width:100%; display:flex; flex-direction:column; gap:8px; animation:fadeUp .4s .15s ease both; }
  .guess-slot { width:100%; height:54px; border:1px solid var(--border); border-radius:10px; background:var(--surface); display:flex; align-items:center; padding:0 16px; font-size:15px; position:relative; }
  .guess-slot.correct { background:var(--green-bg); border-color:var(--green-border); color:var(--green); font-weight:500; }
  .guess-slot.wrong   { background:var(--red-bg);   border-color:var(--red-border);   color:var(--red);   font-weight:500; }
  .guess-slot.empty   { color:var(--text-tertiary); }
  .guess-number { font-size:11px; font-weight:600; color:var(--text-tertiary); margin-right:14px; min-width:14px; letter-spacing:.2px; }
  .guess-slot.correct .guess-number { color:var(--green); }
  .guess-slot.wrong   .guess-number { color:var(--red); }
  .slot-num { font-size:10px; font-weight:600; color:var(--text-tertiary); margin-right:10px; min-width:12px; }
  .guess-slot.correct .slot-num { color:var(--green); }
  .guess-slot.wrong   .slot-num { color:var(--red); }
  .slot-icon { position:absolute; right:16px; font-size:13px; }
  .guess-icon { position:absolute; right:16px; font-size:15px; }

  /* HINT SECTION */
  .hint-section { width:100%; display:flex; flex-direction:column; gap:10px; animation:fadeUp .4s .18s ease both; }

  .hint-trigger-btn {
    width:100%; height:48px;
    background:var(--surface); border:1.5px dashed var(--border); border-radius:10px;
    font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; color:var(--text-secondary);
    cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
    transition:border-color .2s, color .2s, background .2s;
  }
  .hint-trigger-btn:hover { border-color:var(--text-tertiary); color:var(--text-primary); background:var(--bg); }
  .hint-trigger-btn.open { border-style:solid; border-color:var(--text-tertiary); }
  .hint-trigger-btn:disabled { opacity:.35; cursor:not-allowed; }
  .hint-count-badge { font-size:11px; font-weight:600; background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:2px 8px; color:var(--text-tertiary); }

  .hint-options { display:none; flex-direction:column; gap:8px; }
  .hint-options.open { display:flex; animation:fadeUp .2s ease both; }
  .hint-options-label { font-size:11px; font-weight:600; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:.6px; padding:0 2px; }

  /* Individual hint option */
  .hint-option-btn {
    width:100%; border-radius:10px; border:1px solid var(--border); background:var(--surface);
    padding:13px 16px; display:flex; align-items:center; gap:12px;
    cursor:pointer; transition:border-color .18s, background .18s; text-align:left;
    font-family:'DM Sans',sans-serif;
  }
  .hint-option-btn:hover:not(.revealed) { border-color:var(--text-tertiary); background:var(--bg); }
  .hint-option-btn.revealed { cursor:default; }
  .hint-option-btn.revealed.region     { border-color:var(--blue-border);   background:var(--blue-bg); }
  .hint-option-btn.revealed.conference { border-color:var(--yellow-border);  background:var(--yellow-bg); }
  .hint-option-btn.revealed.colors     { border-color:var(--purple-border);  background:var(--purple-bg); }

  .hint-icon { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
  .hint-icon.region     { background:var(--blue-bg);   }
  .hint-icon.conference { background:var(--yellow-bg); }
  .hint-icon.colors     { background:var(--purple-bg); }

  .hint-text-wrap { flex:1; }
  .hint-type-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; color:var(--text-tertiary); margin-bottom:2px; }
  .hint-option-btn.revealed.region     .hint-type-label { color:var(--blue); }
  .hint-option-btn.revealed.conference .hint-type-label { color:var(--yellow); }
  .hint-option-btn.revealed.colors     .hint-type-label { color:var(--purple); }

  .hint-preview { font-size:13px; color:var(--text-tertiary); font-style:italic; }
  .hint-revealed-value { font-size:14px; font-weight:500; color:var(--text-primary); display:none; }
  .hint-option-btn.revealed .hint-preview { display:none; }
  .hint-option-btn.revealed .hint-revealed-value { display:block; }

  .hint-arrow { font-size:13px; color:var(--text-tertiary); flex-shrink:0; }
  .hint-option-btn.revealed .hint-arrow { display:none; }

  .color-swatches { display:flex; gap:7px; margin-top:5px; }
  .swatch { width:22px; height:22px; border-radius:5px; border:1px solid rgba(0,0,0,.1); }

  /* INPUT */
  .input-area { width:100%; position:relative; animation:fadeUp .4s .2s ease both; }
  .input-area input { width:100%; height:54px; border:1.5px solid var(--border); border-radius:10px; background:var(--surface); padding:0 130px 0 18px; font-family:'DM Sans',sans-serif; font-size:15px; color:var(--text-primary); outline:none; transition:border-color .2s; }
  .input-area input:focus { border-color:var(--border-focus); }
  .input-area input::placeholder { color:var(--text-tertiary); }
  .submit-btn { position:absolute; right:6px; top:50%; transform:translateY(-50%); height:42px; padding:0 18px; background:var(--accent); color:#fff; border:none; border-radius:7px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:opacity .2s; }
  .submit-btn:hover { opacity:.82; }
  .submit-btn:disabled { opacity:.3; cursor:default; }

  /* AUTOCOMPLETE */
  .autocomplete-list { position:absolute; top:58px; left:0; right:0; background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; z-index:200; max-height:210px; overflow-y:auto; box-shadow:0 6px 20px rgba(0,0,0,.07); }
  .autocomplete-item { padding:11px 18px; font-size:14px; cursor:pointer; transition:background .12s; color:var(--text-primary); border-bottom:1px solid var(--border); }
  .autocomplete-item:last-child { border-bottom:none; }
  .autocomplete-item:hover, .autocomplete-item.selected { background:var(--bg); }

  .error-msg { font-size:13px; color:var(--red); text-align:center; min-height:18px; margin-top:-8px; }

  /* RESULT */
  .result-panel { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px 24px 24px; text-align:center; animation:fadeUp .4s ease both; }
  .result-panel.win  { border-color:var(--green-border); background:var(--green-bg); }
  .result-panel.lose { border-color:var(--red-border);   background:var(--red-bg); }
  .result-panel h3 { font-family:'DM Serif Display',serif; font-size:24px; margin-bottom:6px; }
  .result-panel.win  h3 { color:var(--green); }
  .result-panel.lose h3 { color:var(--red); }
  .result-sub { font-size:14px; color:var(--text-secondary); margin-bottom:4px; }
  .result-answer { font-size:20px; font-weight:600; color:var(--text-primary); margin:10px 0 20px; font-family:'DM Serif Display',serif; }
  .stats-row { display:flex; margin-bottom:20px; border:1px solid var(--border); border-radius:10px; overflow:hidden; background:rgba(255,255,255,.6); }
  .stat-cell { flex:1; padding:12px 8px; text-align:center; border-right:1px solid var(--border); display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .stat-cell:last-child { border-right:none; }
  .stat-num { font-family:'DM Serif Display',serif; font-size:26px; color:var(--text-primary); line-height:1; }
  .stat-lbl { font-size:10px; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:.6px; margin-top:3px; }
  .share-btn { display:inline-flex; align-items:center; gap:8px; padding:11px 22px; background:var(--accent); color:white; border:none; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; cursor:pointer; transition:opacity .2s; }
  .share-btn:hover { opacity:.82; }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(26,25,22,.5); display:flex; align-items:center; justify-content:center; z-index:1000; padding:24px; opacity:0; pointer-events:none; transition:opacity .2s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--surface); border-radius:16px; border:1px solid var(--border); padding:28px 24px; max-width:420px; width:100%; transform:translateY(12px); transition:transform .2s; }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
  .modal-title { font-family:'DM Serif Display',serif; font-size:20px; }
  .modal-close { width:30px; height:30px; border:1px solid var(--border); border-radius:6px; background:none; cursor:pointer; font-size:16px; color:var(--text-secondary); display:flex; align-items:center; justify-content:center; }
  .modal-close:hover { background:var(--bg); }
  .how-step { display:flex; gap:12px; margin-bottom:14px; align-items:flex-start; }
  .step-num { width:24px; height:24px; border-radius:50%; background:var(--accent); color:white; font-size:12px; font-weight:600; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }
  .step-text { font-size:14px; color:var(--text-secondary); line-height:1.5; }
  .step-text strong { color:var(--text-primary); font-weight:500; }
  .modal-divider { height:1px; background:var(--border); margin:16px 0; }
  .hint-type-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; font-size:13px; color:var(--text-secondary); }
  .hint-type-pill { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.4px; }
  .hint-type-pill.region     { background:var(--blue-bg);   color:var(--blue); }
  .hint-type-pill.conference { background:var(--yellow-bg);  color:var(--yellow); }
  .hint-type-pill.colors     { background:var(--purple-bg);  color:var(--purple); }

  footer { width:100%; max-width:600px; padding:0 24px 32px; text-align:center; font-size:12px; color:var(--text-tertiary); }
  .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(8px); background:var(--text-primary); color:white; padding:11px 22px; border-radius:8px; font-size:14px; font-weight:500; opacity:0; transition:opacity .25s,transform .25s; pointer-events:none; z-index:2000; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .pool-badge { font-size:11px; color:var(--text-tertiary); text-align:center; padding:5px 12px; border:1px solid var(--border); border-radius:20px; background:var(--surface); }
  @media(max-width:480px) { .player-info h2{font-size:20px} .player-photo{width:72px;height:72px} }
  .share-text-box { width:100%; min-height:90px; border:1px solid var(--border); border-radius:8px; background:var(--bg); padding:12px 14px; font-family:'DM Sans',sans-serif; font-size:14px; line-height:1.6; color:var(--text-primary); resize:none; margin:12px 0 8px; }
  .copy-manually-btn { width:100%; height:42px; background:var(--accent); color:white; border:none; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; cursor:pointer; }
  .copy-manually-btn:hover { opacity:.82; }


  /* ── BONUS MODAL ── */
  .bonus-overlay { position:fixed; inset:0; background:rgba(26,25,22,.55); display:flex; align-items:center; justify-content:center; z-index:1500; padding:24px; opacity:0; pointer-events:none; transition:opacity .25s; }
  .bonus-overlay.open { opacity:1; pointer-events:all; }
  .bonus-modal { background:var(--surface); border-radius:18px; border:1px solid var(--border); padding:26px 26px 22px; max-width:520px; width:100%; max-height:90vh; overflow-y:auto; overflow-x:visible; transform:translateY(14px); transition:transform .25s; display:flex; flex-direction:column; gap:14px; }
  .bonus-overlay.open .bonus-modal { transform:translateY(0); }
  .bonus-modal-header { display:flex; align-items:center; justify-content:space-between; }
  .bonus-modal-title { font-family:'DM Serif Display',serif; font-size:18px; }
  .bonus-step-pills { display:flex; gap:6px; }
  .bonus-step-pill { width:28px; height:6px; border-radius:3px; background:var(--border); transition:background .3s; }
  .bonus-step-pill.active { background:var(--accent); }
  .bonus-step-pill.done-win  { background:var(--green); }
  .bonus-step-pill.done-lose { background:var(--red); }
  .bonus-q-label { font-size:11px; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:.6px; font-weight:600; margin-bottom:2px; }
  .bonus-q-title { font-family:'DM Serif Display',serif; font-size:22px; color:var(--text-primary); line-height:1.2; margin-bottom:2px; }
  .bonus-q-sub { font-size:13px; color:var(--text-secondary); margin-top:0; }
  /* Draft pick category buttons */
  .draft-cat-btns { display:flex; flex-direction:column; gap:6px; }
  .draft-cat-btn { width:100%; min-height:54px; border:1.5px solid var(--border); border-radius:10px; background:var(--surface); font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; color:var(--text-primary); cursor:pointer; transition:border-color .18s,background .18s; padding:10px 16px; text-align:left; display:flex; flex-direction:column; gap:2px; }
  .draft-cat-btn .cat-range { font-size:11px; color:var(--text-tertiary); font-weight:400; }
  .draft-cat-btn:hover:not(:disabled) { border-color:var(--text-tertiary); background:var(--bg); }
  .draft-cat-btn:disabled { cursor:default; }
  .draft-cat-btn.correct { background:var(--green-bg); border-color:var(--green-border); color:var(--green); }
  .draft-cat-btn.correct .cat-range { color:var(--green); }
  .draft-cat-btn.wrong   { background:var(--red-bg);   border-color:var(--red-border);   color:var(--red); }
  .draft-cat-btn.wrong   .cat-range { color:var(--red); }
  /* Year guess slots */
  .bonus-guess-slots { display:flex; flex-direction:column; gap:5px; }
  .bonus-slot { height:44px; border:1px solid var(--border); border-radius:9px; background:var(--bg); display:flex; align-items:center; padding:0 14px; font-size:15px; color:var(--text-tertiary); position:relative; }
  .bonus-slot.correct { background:var(--green-bg); border-color:var(--green-border); color:var(--green); font-weight:500; }
  .bonus-slot.wrong   { background:var(--red-bg);   border-color:var(--red-border);   color:var(--red);   font-weight:500; }
  .b-num { font-size:10px; font-weight:600; color:var(--text-tertiary); margin-right:10px; min-width:12px; }
  .bonus-slot.correct .b-num { color:var(--green); }
  .bonus-slot.wrong   .b-num { color:var(--red); }
  .b-icon { position:absolute; right:14px; font-size:15px; }
  .b-arrow { position:absolute; right:14px; font-size:18px; font-weight:600; }
  .b-arrow.up   { color:var(--blue); }
  .b-arrow.down { color:var(--yellow); }
  /* Input row */
  .bonus-input-row { display:flex; gap:8px; position:relative; }
  .bonus-input-row input { flex:1; height:46px; border:1.5px solid var(--border); border-radius:9px; background:var(--surface); padding:0 14px; font-family:'DM Sans',sans-serif; font-size:15px; color:var(--text-primary); outline:none; transition:border-color .2s; }
  .bonus-input-row input:focus { border-color:var(--border-focus); }
  .bonus-input-row input:disabled { opacity:.4; }
  .bonus-submit { height:46px; padding:0 18px; background:var(--accent); color:white; border:none; border-radius:9px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; white-space:nowrap; transition:opacity .2s; }
  .bonus-submit:hover { opacity:.82; }
  .bonus-submit:disabled { opacity:.3; cursor:default; }
  /* Result feedback */
  .bonus-round-result { font-size:14px; font-weight:500; padding:10px 14px; border-radius:8px; text-align:center; display:none; }
  .bonus-round-result.correct { background:var(--green-bg); color:var(--green); border:1px solid var(--green-border); display:block; }
  .bonus-round-result.wrong   { background:var(--red-bg);   color:var(--red);   border:1px solid var(--red-border);   display:block; }
  /* Next button */
  .bonus-next-btn { width:100%; height:46px; background:var(--accent); color:white; border:none; border-radius:9px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; cursor:pointer; transition:opacity .2s; display:none; margin-top:6px; }
  .bonus-next-btn:hover { opacity:.82; }
  /* Score pips */
  .bonus-score-row { display:flex; align-items:center; justify-content:center; gap:10px; }
  .bonus-pip { width:11px; height:11px; border-radius:50%; background:var(--border); transition:background .3s; }
  .bonus-pip.won  { background:var(--green); }
  .bonus-pip.lost { background:var(--red); }
  .bonus-final-msg { font-size:13px; color:var(--text-secondary); text-align:center; }


  /* ── STOPWATCH ── */
  .stopwatch { font-size:14px; font-weight:500; font-variant-numeric:tabular-nums; color:var(--text-secondary); letter-spacing:.4px; transition:color .3s; }
  .stopwatch.done { color:var(--green); }
  .stopwatch.new-best { color:var(--green); font-weight:600; }
  .stat-lbl.best-time-lbl { font-size:9px; }
  .stat-num.best-time-val { font-size:26px; }
  .stat-num.new-best { color:var(--green); }


  .score-bar { display:flex; align-items:center; justify-content:center; gap:24px; padding:12px 0; }
  .score-item { text-align:center; }
  .score-num { font-family:'DM Serif Display',serif; font-size:28px; color:var(--text-primary); line-height:1; }
  .score-lbl { font-size:10px; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:.6px; margin-top:3px; }
  .next-btn { width:100%; padding:14px; background:var(--accent); color:white; border:none; border-radius:12px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:500; cursor:pointer; transition:opacity .2s; margin-top:8px; display:none; }
  .next-btn:hover { opacity:.85; }
  .back-link { display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--text-tertiary); text-decoration:none; margin-bottom:8px; }
  .back-link:hover { color:var(--text-primary); }

function seededShuffle(arr, seed) {
  const a=[...arr]; let s=seed;
  for(let i=a.length-1;i>0;i--){s=(s*1664525+1013904223)&0xffffffff;const j=Math.abs(s)%(i+1);[a[i],a[j]]=[a[j],a[i]];}
  return a;
}


// Infinite mode state
let infQueue = [];
let infIndex = 0;
let infCorrect = 0;
let infTotal = 0;
let player = null;
let guesses = [];
let gameOver = false;
let selectedIndex = -1;
let filteredColleges = [];


function norm(c){ return (c||'').toLowerCase().replace(/[^a-z0-9]/g,''); }

function findClosestMatch(input, list) {
  // Returns the best matching item from list, or null if nothing is close enough
  const n = norm(input);
  if (!n || n.length < 2) return null;
  // Exact normalized match
  const exact = list.find(item => norm(item) === n);
  if (exact) return exact;
  // Starts-with match
  const starts = list.filter(item => norm(item).startsWith(n));
  if (starts.length === 1) return starts[0];
  // Contains match (only if unique)
  const contains = list.filter(item => norm(item).includes(n));
  if (contains.length === 1) return contains[0];
  return null;
}


function norm(c){ return (c||'').toLowerCase().replace(/[^a-z0-9]/g,''); }

function findClosestMatch(input, list) {
  const n = norm(input);
  if (!n || n.length < 2) return null;
  const exact = list.find(item => norm(item) === n);
  if (exact) return exact;
  const starts = list.filter(item => norm(item).startsWith(n));
  if (starts.length === 1) return starts[0];
  const contains = list.filter(item => norm(item).includes(n));
  if (contains.length === 1) return contains[0];
  return null;
}

function buildQueue() {
  // Random shuffle with time-based seed so it's different each session
  const seed = Date.now() % 999999;
  infQueue = seededShuffle([...ELIGIBLE], seed);
  infIndex = 0;
}

function loadPlayer() {
  if (infIndex >= infQueue.length) buildQueue();
  player = infQueue[infIndex++];
  guesses = [];
  gameOver = false;
  selectedIndex = -1;
  filteredColleges = [];

  document.getElementById('playerName').textContent = player.name;
  document.getElementById('playerTeam').textContent = player.team;
  document.getElementById('playerPos').textContent = player.pos;
  document.getElementById('playerPhoto').innerHTML = `<img src="https://cdn.nba.com/headshots/nba/latest/1040x760/${player.nbaId}.png" alt="${player.name}" onerror="this.parentElement.textContent='🏀'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>`;

  document.getElementById('inputArea').style.display = 'flex';
  document.getElementById('errorMsg').textContent = '';
  document.getElementById('resultPanel').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('guessInput').value = '';
  document.getElementById('autocompleteList').style.display = 'none';

  renderGuessSlots();
  document.getElementById('guessInput').focus();
}

function renderGuessSlots() {
  const c = document.getElementById('guessSlots'); c.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const slot = document.createElement('div'); slot.className = 'guess-slot';
    const num = document.createElement('span'); num.className = 'slot-num'; num.textContent = i + 1;
    const txt = document.createElement('span'); txt.className = 'slot-text';
    if (guesses[i]) {
      const ok = norm(guesses[i]) === norm(player.college);
      slot.classList.add(ok ? 'correct' : 'wrong');
      txt.textContent = guesses[i];
      const ico = document.createElement('span'); ico.className = 'slot-icon'; ico.textContent = ok ? '✓' : '✗';
      slot.appendChild(num); slot.appendChild(txt); slot.appendChild(ico);
    } else {
      txt.textContent = 'Guess ' + (i + 1); txt.style.color = 'var(--text-tertiary)';
      slot.appendChild(num); slot.appendChild(txt);
    }
    c.appendChild(slot);
  }
}

function submitGuess() {
  if (gameOver) return;
  const input = document.getElementById('guessInput');
  const val = input.value.trim();
  const err = document.getElementById('errorMsg'); err.textContent = '';
  if (!val) { err.textContent = 'Please enter a college name.'; return; }
  const matchedCollege = findClosestMatch(val, ALL_COLLEGES);
  if (!matchedCollege) { err.textContent = 'Please select a valid college from the suggestions.'; return; }
  if (guesses.some(g => norm(g) === norm(matchedCollege))) {
    err.textContent = 'You already guessed ' + matchedCollege + '!';
    input.value = ''; return;
  }
  input.value = '';
  guesses.push(matchedCollege);
  document.getElementById('autocompleteList').style.display = 'none';
  filteredColleges = []; selectedIndex = -1;
  const ok = norm(matchedCollege) === norm(player.college);
  renderGuessSlots();
  if (ok) { endRound(true); }
  else if (guesses.length >= 3) { endRound(false); }
}

function endRound(won) {
  gameOver = true;
  infTotal++;
  if (won) infCorrect++;
  updateScore();

  document.getElementById('inputArea').style.display = 'none';
  document.getElementById('errorMsg').style.display = 'none';

  const panel = document.getElementById('resultPanel');
  panel.style.display = 'block';
  panel.className = 'result-panel ' + (won ? 'win' : 'lose');
  document.getElementById('resultTitle').textContent = won ? 'Nice work! 🎓' : 'Better luck next time';
  document.getElementById('resultSub').textContent = won
    ? 'You got it' + (guesses.length === 1 ? ' on the first try!' : ' in ' + guesses.length + ' guess' + (guesses.length > 1 ? 'es!' : '!'))
    : 'The correct answer was:';
  document.getElementById('resultAnswer').textContent = player.college;
  document.getElementById('nextBtn').style.display = 'block';
}

function updateScore() {
  document.getElementById('scoreCorrect').textContent = infCorrect;
  document.getElementById('scoreTotal').textContent = infTotal;
  document.getElementById('scorePct').textContent = infTotal > 0 ? Math.round((infCorrect / infTotal) * 100) + '%' : '—';
}

function nextPlayer() {
  loadPlayer();
}

// Autocomplete
const guessInput = document.getElementById('guessInput');
guessInput.addEventListener('input', () => {
  const v = guessInput.value.toLowerCase();
  const list = document.getElementById('autocompleteList');
  if (!v || v.length < 1) { list.style.display = 'none'; filteredColleges = []; return; }
  filteredColleges = ALL_COLLEGES.filter(c => c.toLowerCase().includes(v)).slice(0, 8);
  selectedIndex = -1;
  if (!filteredColleges.length) { list.style.display = 'none'; return; }
  list.innerHTML = '';
  filteredColleges.forEach((c, i) => {
    const item = document.createElement('div'); item.className = 'autocomplete-item'; item.textContent = c;
    item.addEventListener('mousedown', () => { guessInput.value = c; list.style.display = 'none'; filteredColleges = []; submitGuess(); });
    item.addEventListener('touchstart', (e) => { e.preventDefault(); guessInput.value = c; list.style.display = 'none'; filteredColleges = []; submitGuess(); }, {passive:false});
    list.appendChild(item);
  });
  list.style.display = 'block';
});

guessInput.addEventListener('keydown', e => {
  const list = document.getElementById('autocompleteList');
  const items = list.querySelectorAll('.autocomplete-item');
  if (e.key === 'ArrowDown') { e.preventDefault(); selectedIndex = Math.min(selectedIndex + 1, items.length - 1); items.forEach((el,i) => el.classList.toggle('selected', i === selectedIndex)); if(items[selectedIndex]) guessInput.value = filteredColleges[selectedIndex]; }
  else if (e.key === 'ArrowUp') { e.preventDefault(); selectedIndex = Math.max(selectedIndex - 1, -1); items.forEach((el,i) => el.classList.toggle('selected', i === selectedIndex)); if(selectedIndex >= 0 && items[selectedIndex]) guessInput.value = filteredColleges[selectedIndex]; }
  else if (e.key === 'Enter') { list.style.display = 'none'; submitGuess(); }
  else if (e.key === 'Escape') { list.style.display = 'none'; }
});

document.addEventListener('click', e => {
  if (!e.target.closest('#inputArea')) document.getElementById('autocompleteList').style.display = 'none';
});

// Init
buildQueue();
loadPlayer();
document.getElementById('poolBadge').textContent = ELIGIBLE.length + ' players in the pool';
</script>
